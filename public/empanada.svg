<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 370">
  <defs>
    <radialGradient id="emp-body" cx="38%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#f5c248"/>
      <stop offset="40%" stop-color="#d08018"/>
      <stop offset="100%" stop-color="#8a4c06"/>
    </radialGradient>
    <radialGradient id="emp-fold" cx="50%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#e09020"/>
      <stop offset="100%" stop-color="#7a3c05"/>
    </radialGradient>
    <radialGradient id="emp-shadow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#7a4008" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7a4008" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="250" cy="356" rx="196" ry="12" fill="rgba(0,0,0,0.25)"/>

  <!-- Repulgue folds — appear slightly below body edge for depth -->
  <ellipse cx="62"  cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="84"  cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="106" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="128" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="150" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="172" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="194" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="216" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="238" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="260" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="282" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="304" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="326" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="348" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="370" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="392" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="414" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>
  <ellipse cx="436" cy="263" rx="14" ry="9" fill="url(#emp-fold)"/>

  <!-- Main body: upper half-ellipse -->
  <path d="M 56 263 A 194 232 0 0 1 444 263 Z" fill="url(#emp-body)"/>

  <!-- Bottom shadow on body -->
  <path d="M 56 263 A 194 232 0 0 1 444 263 Z" fill="url(#emp-shadow)"/>

  <!-- Main highlight -->
  <ellipse cx="208" cy="152" rx="80" ry="46" fill="rgba(255,255,255,0.17)" transform="rotate(-14 208 152)"/>
  <!-- Small secondary highlight -->
  <ellipse cx="178" cy="118" rx="32" ry="18" fill="rgba(255,255,255,0.10)"/>
</svg>

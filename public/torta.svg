<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480">
  <defs>
    <linearGradient id="choc-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a0d04"/>
      <stop offset="18%" stop-color="#6e2a12"/>
      <stop offset="82%" stop-color="#5a220e"/>
      <stop offset="100%" stop-color="#1c0803"/>
    </linearGradient>
    <radialGradient id="ganache-top" cx="38%" cy="35%" r="58%">
      <stop offset="0%" stop-color="#1e0a04"/>
      <stop offset="100%" stop-color="#070201"/>
    </radialGradient>
    <radialGradient id="cream-top" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f8ecd8"/>
      <stop offset="100%" stop-color="#e8d4b0"/>
    </radialGradient>
    <radialGradient id="truffle" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#6a2a10"/>
      <stop offset="100%" stop-color="#2e0f05"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="250" cy="458" rx="142" ry="16" fill="rgba(0,0,0,0.28)"/>

  <!-- === LAYER 3 (bottom) === -->
  <ellipse cx="250" cy="418" rx="142" ry="24" fill="#160703"/>
  <rect x="108" y="310" width="284" height="108" fill="url(#choc-side)"/>

  <!-- Cream 2 -->
  <rect x="108" y="292" width="284" height="20" fill="#e8d4b0"/>
  <ellipse cx="250" cy="292" rx="142" ry="22" fill="url(#cream-top)"/>

  <!-- === LAYER 2 (middle) === -->
  <rect x="109" y="195" width="282" height="97" fill="url(#choc-side)"/>

  <!-- Cream 1 -->
  <rect x="109" y="177" width="282" height="20" fill="#e8d4b0"/>
  <ellipse cx="250" cy="177" rx="141" ry="22" fill="url(#cream-top)"/>

  <!-- === LAYER 1 (top) === -->
  <rect x="110" y="108" width="280" height="69" fill="url(#choc-side)"/>

  <!-- Ganache drips -->
  <rect x="138" y="99" width="16" height="52" rx="8" fill="#060201"/>
  <rect x="180" y="95" width="15" height="58" rx="7.5" fill="#060201"/>
  <rect x="226" y="92" width="16" height="64" rx="8" fill="#060201"/>
  <rect x="273" y="95" width="15" height="58" rx="7.5" fill="#060201"/>
  <rect x="316" y="99" width="15" height="50" rx="7.5" fill="#060201"/>
  <rect x="356" y="103" width="14" height="44" rx="7" fill="#060201"/>

  <!-- Ganache top -->
  <ellipse cx="250" cy="106" rx="141" ry="24" fill="url(#ganache-top)"/>

  <!-- Ganache shine -->
  <ellipse cx="216" cy="97" rx="46" ry="12" fill="rgba(255,255,255,0.07)" transform="rotate(-10 216 97)"/>

  <!-- Truffle decorations -->
  <circle cx="186" cy="101" r="13" fill="url(#truffle)"/>
  <circle cx="186" cy="98" r="6" fill="#7a3518"/>
  <circle cx="250" cy="93" r="14" fill="url(#truffle)"/>
  <circle cx="250" cy="90" r="7" fill="#7a3518"/>
  <circle cx="314" cy="100" r="13" fill="url(#truffle)"/>
  <circle cx="314" cy="97" r="6" fill="#7a3518"/>

  <!-- Truffle shine dots -->
  <circle cx="181" cy="93" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="245" cy="85" r="3.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="309" cy="92" r="3" fill="rgba(255,255,255,0.35)"/>
</svg>
